<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Offline – test-pwa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { --color-primary: #E1477E; --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-family); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f5; color: #333; text-align: center; padding: 24px; }
    @media (prefers-color-scheme: dark) { body { background: #181818; color: #f0f0f0; } }
    h1 { font-size: 1.75rem; margin-bottom: 12px; color: var(--color-primary); }
    p { font-size: 1rem; max-width: 380px; line-height: 1.6; margin-bottom: 24px; opacity: 0.8; }
    button { background: var(--color-primary); color: white; border: none; border-radius: 6px; padding: 12px 24px; font-size: 1rem; cursor: pointer; }
  </style>
</head>
<body>
  <div>📡</div>
  <h1>You're offline</h1>
  <p>It looks like you've lost your internet connection. Check your connection and try again.</p>
  <button onclick="window.location.reload()">Try again</button>
</body>
</html>
